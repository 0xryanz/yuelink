# YueLink minimal fallback config.
# Only used when subscription does not provide a complete config.
# In normal usage, the subscription provides everything
# (proxy-groups, rules, rule-providers, DNS, sniffer, etc.)

mixed-port: 7890
allow-lan: false
log-level: info
ipv6: false

external-controller: 127.0.0.1:9090

dns:
  enable: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query

proxies:

proxy-groups:
  - name: "$app_name"
    type: select
    proxies:
      - DIRECT

rules:
  - MATCH,DIRECT
